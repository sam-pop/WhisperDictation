name: WhisperDictation
options:
  bundleIdPrefix: com.sampop
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5"
    MACOSX_DEPLOYMENT_TARGET: "14.0"

targets:
  WhisperDictation:
    type: application
    platform: macOS
    sources:
      - path: WhisperDictation
        excludes:
          - "**/*.entitlements"
          - "Info.plist"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.sampop.WhisperDictation
        INFOPLIST_FILE: WhisperDictation/Info.plist
        CODE_SIGN_ENTITLEMENTS: WhisperDictation/WhisperDictation.entitlements
        SWIFT_OBJC_BRIDGING_HEADER: WhisperDictation/WhisperDictation-Bridging-Header.h
        HEADER_SEARCH_PATHS:
          - "$(PROJECT_DIR)/lib"
        LIBRARY_SEARCH_PATHS:
          - "$(PROJECT_DIR)/lib"
        OTHER_LDFLAGS:
          - "-lwhisper"
          - "-lggml"
          - "-lggml-base"
          - "-lggml-cpu"
          - "-lggml-metal"
          - "-lggml-blas"
          - "-lc++"
        CODE_SIGN_IDENTITY: "-"
        ENABLE_HARDENED_RUNTIME: false
      configs:
        Debug:
          SWIFT_OPTIMIZATION_LEVEL: "-Onone"
        Release:
          SWIFT_OPTIMIZATION_LEVEL: "-O"
    dependencies:
      - sdk: Accelerate.framework
      - sdk: Metal.framework
      - sdk: MetalKit.framework
      - sdk: AVFoundation.framework
      - sdk: CoreGraphics.framework
      - sdk: AppKit.framework
      - sdk: CoreAudio.framework
      - sdk: ServiceManagement.framework
    info:
      path: WhisperDictation/Info.plist
      properties:
        LSUIElement: true
        NSMicrophoneUsageDescription: "WhisperDictation needs microphone access to capture your voice for speech-to-text transcription."
        NSPrincipalClass: NSApplication
        CFBundleIconFile: AppIcon
    entitlements:
      path: WhisperDictation/WhisperDictation.entitlements
      properties:
        com.apple.security.device.audio-input: true

  WhisperDictationTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: WhisperDictationTests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.sampop.WhisperDictationTests
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: WhisperDictation
